bio: |
  Hi, I am Sabin Thapa, a Physics PhD candidate at Kent State University
  (expected 2026). I work in theoretical and phenomenological high-energy
  nuclear physics, with a focus on quarkonium transport, suppression, and
  regeneration in QGP across RHIC and LHC systems.

  My research uses semi-classical transport and open-quantum-system methods
  (including Lindblad evolution), supported by reproducible C++ and Python
  simulation pipelines. In parallel, I explore quantum computing for HEP
  (state preparation, adiabatic, and variational workflows for lattice gauge
  theory) and practical ML/AI support for scientific workflows.

